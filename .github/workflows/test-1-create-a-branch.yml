name: Test Create a branch workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test_workflow:
    name: Test 1-create-a-branch logic using act
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # This silences the warning
    steps:
      # ... rest of your steps
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install act
        run: curl https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash

      - name: Create mock create event payload
        run: |
          cat << 'EOF' > event.json
          {
            "ref": "my-first-branch",
            "ref_type": "branch",
            "repository": {
              "name": "mock-repo",
              "owner": {
                "login": "mock-user"
              }
            }
          }
          EOF

      - name: Run workflow using act
        run: |
          ACT_PATH=$(find . -name act -type f -executable | head -n 1)
          $ACT_PATH create \
            -e event.json \
            -W .github/workflows/1-create-a-branch.yml \
            --secret GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -P ubuntu-latest=catthehacker/ubuntu:act-latest
