name: Test Create a branch workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test_workflow:
    name: Test 1-create-a-branch logic using act
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # This silences the warning
    steps:
      # ... rest of your steps
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install act
        run: curl https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash

      - name: Create mock create event payload
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          EVENT_REPO_NAME: ${{ github.event.repository.name }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          jq -n \
            --arg owner "$REPO_OWNER" \
            --arg repo_name "$EVENT_REPO_NAME" \
            --arg full_name "$REPO_FULL_NAME" \
            '{
              "action": "opened",
              "issue": {
                "number": 1,
                "title": "Introduction to GitHub",
                "user": { "login": $owner },
                "state": "open"
              },
              "repository": {
                "name": $repo_name,
                "full_name": $full_name,
                "owner": {
                  "login": $owner
                }
              },
              "sender": {
                "login": $owner
              }
            }' > event.json

      - name: Create Mock Issue
        id: create_issue
        run: |
          ISSUE_URL=$(gh issue create --title "Exercise: Mock Issue" --body "Mock issue for act testing")
          gh issue comment "$ISSUE_URL" --body "Dummy comment for testing"
          echo "ISSUE_URL=$ISSUE_URL" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run workflow using act
        run: |
          ACT_PATH=$(find . -name act -type f -executable | head -n 1)
          $ACT_PATH -j check_step_work \
            -e event.json \
            -W .github/workflows/1-create-a-branch.yml \
            --secret GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -P ubuntu-latest=catthehacker/ubuntu:full-latest

      - name: Close Mock Issue
        if: always()
        run: |
          gh issue close $ISSUE_URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
